# Paper-Agent 一键启动 (网关 + Worker + Redis + MySQL)
# 使用：docker compose up -d --build
version: "3.9"

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: paper_agent
      MYSQL_USER: paper_agent
      MYSQL_PASSWORD: paper_agent
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

  # 迁移作业：启动前执行一次 alembic upgrade head，完成后退出
  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build: .
    command: ["celery", "-A", "src.infra.celery_app.celery_app", "worker", "--loglevel=info", "--concurrency=4"]
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # 可选：Celery 监控面板
  flower:
    build: .
    command: ["celery", "-A", "src.infra.celery_app.celery_app", "flower", "--port=5555"]
    env_file:
      - .env
    ports:
      - "5555:5555"
    depends_on:
      - redis

volumes:
  redis_data:
  mysql_data:
